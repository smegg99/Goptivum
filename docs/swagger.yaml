basePath: /api/v1
definitions:
  types.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  types.LoginRequest:
    properties:
      login:
        example: admin
        maxLength: 255
        minLength: 3
        type: string
      password:
        example: strongPa55!
        type: string
    required:
    - login
    - password
    type: object
  types.LoginResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        example: 900
        type: integer
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      token_type:
        example: Bearer
        type: string
    type: object
  types.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
        type: string
    required:
    - refresh_token
    type: object
host: localhost:3001
info:
  contact: {}
  description: API for Goptivum. Authentication uses JWT Bearer tokens. Include the
    access token in the Authorization header as 'Bearer {token}' for authenticated
    endpoints.
  title: Goptivum API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates an account using login and password. On success returns
        access and refresh JWT tokens. The access token should be used for API requests
        and the refresh token to get new access tokens when they expire.
      parameters:
      - description: Login credentials containing login and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Authentication successful; JWT tokens returned
          schema:
            $ref: '#/definitions/types.LoginResponse'
        "400":
          description: Bad Request - Invalid request format
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "401":
          description: Unauthorized - Invalid credentials
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: Internal Server Error - Token generation failure
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      summary: Authenticate and receive JWT tokens
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Use a valid refresh token to obtain a new access token. This should
        be called when the access token expires.
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New access token generated successfully
          schema:
            $ref: '#/definitions/types.LoginResponse'
        "400":
          description: Bad Request - Invalid request format
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "401":
          description: Unauthorized - Invalid or expired refresh token
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: Internal Server Error - Token generation failure
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
  /me:
    get:
      description: Returns information about the currently authenticated user based
        on the JWT token
      produces:
      - application/json
      responses:
        "200":
          description: Success - Current user information
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - Invalid or missing token
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "404":
          description: Not Found - User not found
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - auth
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the access token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
